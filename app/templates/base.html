<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if noindex %}
      <meta name="robots" content="noindex,nofollow">
    {% endif %}
    <title>{% block title %}{{ settings.app_name }}{% endblock %}</title>
    <link rel="icon" type="image/png" sizes="64x64" href="{{ static_asset('/static/favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ static_asset('/static/vector-solutions-logo.png') }}">
    <link rel="stylesheet" href="{{ static_asset('/static/styles.css') }}">
    {% if enable_mathjax %}
      <script>
        window.MathJax = {
          tex: {
            inlineMath: [["\\(", "\\)"]],
            displayMath: [["\\[", "\\]"]],
            processEscapes: true
          },
          options: {
            skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
          }
        };
      </script>
      <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    {% endif %}
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">
          <img src="{{ static_asset('/static/vector-solutions-logo.png') }}" alt="">
        </span>
        <span class="brand-text">Вектор решений</span>
      </a>
      <nav class="topnav" aria-label="Основная навигация">
        <a href="/">Главная</a>
        <a href="/format">Моя Методика</a>
        <a href="/about">О преподавателе</a>
        <a href="/pricing">Цены</a>
        {% if is_admin %}
          <a href="/admin">Админка</a>
          <a href="/admin/homework">Все ДЗ</a>
          <a href="/admin/diagnostics">Диагностики</a>
          <form method="post" action="/admin/logout" class="inline-form">
            <button class="link-button" type="submit">Выйти</button>
          </form>
        {% else %}
          <a class="nav-login-link" href="/cabinet/login">Вход в ЛК</a>
        {% endif %}
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
